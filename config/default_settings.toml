# デフォルト設定値（このファイルはリポジトリに含まれます）
# ユーザー設定は config/user_settings.toml に保存されます

[location]
latitude = 35.6895
longitude = 139.6917
name = "東京"

[update]
interval_secs = 300

[image]
width = 1920
height = 1080
show_stars = true
show_clouds = false
water_depth = 0.7

[behavior]
autostart = false

[gemini]
api_key = ""
model_name = "gemini-2.5-flash-image"
enhance_prompt = "Enhance this sky image to look photorealistic, like a high-quality photograph. Preserve the sun position and sky colors but add natural cloud textures, atmospheric haze, and photographic quality."
enabled = false
